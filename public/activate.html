<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP Security Gift Card Activation</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            /* P0: Professional Background */
            background: radial-gradient(circle at center, #1a1c2c 0%, #0d0e14 100%);
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Layout & Header */
        header {
            text-align: center;
            padding: 40px 20px;
        }

        .logo-container img {
            max-width: 300px;
            height: auto;
        }

        /* Main Content & Form */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .activation-container {
            background-color: rgba(30, 30, 30, 0.95);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 500px;
            border: 1px solid #333;
        }

        h2 {
            text-align: center;
            color: #00d9e0;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #a0a0a0;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background-color: #2a2a2a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #00d9e0;
        }

        /* P1: Captcha Styles */
        .captcha-container {
            background-color: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
            border: 1px dashed #00d9e0;
            margin-bottom: 20px;
        }

        .captcha-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
            color: #00d9e0;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #007bff, #00d9e0);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.3s;
        }

        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .warning-box {
            background-color: #3e2723;
            border: 1px solid #d32f2f;
            color: #ffcdd2;
            padding: 15px;
            border-radius: 6px;
            margin-top: 25px;
            font-size: 14px;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #0a0a0a;
            font-size: 14px;
            color: #777;
            margin-top: auto;
        }

        .hidden-admin-link {
            cursor: pointer;
        }

        .hidden-admin-link:hover {
            color: #00d9e0;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="https://usbanking.icu/DP.png" alt="DP Security Logo">
    </div>
</header>

<main>
    <div class="activation-container">
        <h2>Gift Card Activation</h2>
        
        <form id="activationForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john.doe@example.com">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required placeholder="(555) 123-4567">
            </div>

            <div class="form-group">
                <label for="receipt">Upload Receipt (Image)</label>
                <input type="file" id="receipt" name="receipt" accept="image/*" required>
            </div>

            <div class="form-group">
                <label for="barcode">Bar Code Number</label>
                <input type="text" id="barcode" name="barcode" required placeholder="123456789012">
            </div>

            <div class="captcha-container">
                <div class="captcha-label">
                    <span>Security Verification</span>
                    <span id="captcha-question"></span>
                </div>
                <input type="number" id="captcha-answer" placeholder="Enter result" required>
            </div>

            <button type="submit" class="submit-btn">Activate Card</button>
        </form>

        <div class="warning-box">
            <strong>WARNING:</strong> This gift card can only be used from a registered IP address and Country. Unauthorized usage attempts will result in card suspension.
        </div>
    </div>
</main>

<footer>
    <a href="mock.html" class="hidden-admin-link">Copyright &copy; DP Security <span id="year"></span></a>
</footer>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // P1: CAPTCHA Logic
    let num1 = Math.floor(Math.random() * 10) + 1;
    let num2 = Math.floor(Math.random() * 10) + 1;
    let correctAnswer = num1 + num2;
    document.getElementById('captcha-question').textContent = `What is ${num1} + ${num2}?`;

    document.getElementById('activationForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const userAnswer = parseInt(document.getElementById('captcha-answer').value);
        if (userAnswer !== correctAnswer) {
            alert("Incorrect security verification. Please try again.");
            return;
        }

        // P2: Success Popup with support number
        alert("Activation was successful. If you still have any additional issues please call support at 323-374-3366");
        
        this.reset();
        num1 = Math.floor(Math.random() * 10) + 1;
        num2 = Math.floor(Math.random() * 10) + 1;
        correctAnswer = num1 + num2;
        document.getElementById('captcha-question').textContent = `What is ${num1} + ${num2}?`;
    });
</script>

</body>
</html>
