<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs" type="module"></script>

<script type="module">
    // Import Face Detector
    import { FaceDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs";
    
    let faceDetector;
    let isFaceReady = false;

    // Initialize the Face Detector
    async function initFaceDetection() {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
        faceDetector = await FaceDetector.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite`,
                delegate: "GPU"
            },
            runningMode: "IMAGE"
        });
        isFaceReady = true;
    }
    initFaceDetection();

    // 2. Updated Take Photo Logic
    window.takePhotoAction = async function() {
        if (!isFaceReady) {
            alert("Security system initializing... please wait 2 seconds.");
            return;
        }

        const video = document.getElementById('video-preview');
        const photo = document.getElementById('captured-photo');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);

        // Check 1: Blank Image Detection (Pixel Analysis)
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let totalBrightness = 0;
        for (let i = 0; i < imageData.length; i += 4) {
            totalBrightness += (imageData[i] + imageData[i+1] + imageData[i+2]) / 3;
        }
        const avgBrightness = totalBrightness / (imageData.length / 4);
        
        if (avgBrightness < 10) { // Too dark/blank
            alert("Error: Security photo is too dark or blank. Ensure your camera is not covered.");
            return;
        }

        // Check 2: Face Detection
        const detections = faceDetector.detect(canvas).detections;
        if (detections.length === 0) {
            alert("Security Verification Failed: No face detected. Please face the camera clearly.");
            return;
        }

        // Success: Store the image
        capturedImageData = canvas.toDataURL('image/png');
        photo.src = capturedImageData;
        photo.style.display = 'block';
        video.style.display = 'none';
        document.getElementById('take-photo').style.display = 'none';
        video.srcObject.getTracks().forEach(track => track.stop());
    }
</script>
