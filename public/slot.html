<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie's Wacky Slot</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --slot-bg: #2d2d2d;
            --border-color: #333;
            --text-color: #e0e0e0;
            --accent-location: #64b5f6;
            --accent-disaster: #ff8a65;
            --accent-food: #fff176;
            --accent-cooking: #ba68c8;
            --accent-rest: #ff5252;
            --item-h: 85px; 
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #app-container {
            background-color: var(--container-bg);
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            max-width: 1100px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        #title { font-size: 24px; font-weight: 800; }
        #status-light { font-weight: bold; font-size: 17px; color: #4caf50; }

        #slot-machine {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 25px;
            position: relative;
        }

        #slot-machine::after {
            content: "";
            position: absolute;
            top: calc(var(--item-h) + 40px); 
            left: -5px;
            right: -5px;
            height: var(--item-h);
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
            pointer-events: none;
            border-radius: 6px;
            z-index: 10;
        }

        .column {
            background-color: var(--slot-bg);
            border-radius: 10px;
            height: calc(var(--item-h) * 3 + 40px); 
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid #444;
            position: relative;
        }

        .col-header {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 11px;
            letter-spacing: 1.2px;
            background: #252525;
            color: #aaa;
            z-index: 20;
            border-bottom: 1px solid #444;
        }

        .slot-display {
            height: calc(var(--item-h) * 3);
            position: relative;
            overflow: hidden;
        }

        .reel-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
        }

        .reel-text {
            font-size: 16px;
            font-weight: 800;
            text-align: center;
            height: var(--item-h);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            box-sizing: border-box;
            opacity: 0.15;
            transition: opacity 0.4s, transform 0.4s, color 0.4s;
        }

        .spinning .reel-text { filter: blur(1.5px); }
        
        .selected-item { 
            opacity: 1 !important;
            transform: scale(1.05);
            text-shadow: 0 0 12px currentColor;
        }

        #col-1 .reel-text { color: var(--accent-location); }
        #col-2 .reel-text { color: var(--accent-disaster); }
        #col-3 .reel-text { color: var(--accent-food); }
        #col-4 .reel-text { color: var(--accent-cooking); }
        #col-5 .reel-text { color: var(--accent-rest); }

        .action-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .action-item {
            font-size: 22px; 
            font-weight: 700;
            padding: 15px 20px;
            background: #222;
            border-radius: 8px;
            border-left: 6px solid #555;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .action-item.active {
            background: #2a2a2a;
            border-left-width: 12px;
            transform: translateX(8px);
        }

        .label { font-weight: 800; color: #666; font-size: 12px; display: block; margin-bottom: 4px; text-transform: uppercase;}

        #spin-button {
            width: 100%;
            background-color: #515e9c;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 18px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 20px;
        }

        #spin-button:disabled { background-color: #333; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div id="title">🎰 Cookie's Wacky Randomizer</div>
            <div id="status-light">Ready</div>
        </header>

        <div id="slot-machine">
            <div class="column" id="col-1"><div class="col-header">LOCATION</div><div class="slot-display"><div class="reel-container" id="reel-1"></div></div></div>
            <div class="column" id="col-2"><div class="col-header">DISASTER</div><div class="slot-display"><div class="reel-container" id="reel-2"></div></div></div>
            <div class="column" id="col-3"><div class="col-header">FOOD</div><div class="slot-display"><div class="reel-container" id="reel-3"></div></div></div>
            <div class="column" id="col-4"><div class="col-header">COOKING</div><div class="slot-display"><div class="reel-container" id="reel-4"></div></div></div>
            <div class="column" id="col-5"><div class="col-header">THE VILLAIN</div><div class="slot-display"><div class="reel-container" id="reel-5"></div></div></div>
        </div>

        <div id="action-box">
            <div class="action-list">
                <div class="action-item" id="item-0" style="border-color: var(--accent-location)"><span class="label">Location</span> <span id="res-loc">-</span></div>
                <div class="action-item" id="item-1" style="border-color: var(--accent-disaster)"><span class="label">Disaster</span> <span id="res-dis">-</span></div>
                <div class="action-item" id="item-2" style="border-color: var(--accent-food)"><span class="label">The Meal</span> <span id="res-food">-</span></div>
                <div class="action-item" id="item-3" style="border-color: var(--accent-cooking)"><span class="label">Method</span> <span id="res-cook">-</span></div>
                <div class="action-item" id="item-4" style="border-color: var(--accent-rest); grid-column: span 2;"><span class="label">The Villain</span> <span id="res-buddy">-</span></div>
            </div>
        </div>

        <button id="spin-button" onclick="startSpin()">Randomize!</button>
    </div>

    <script>
        const data = [
            ["A Mattress Store", "A Portal Potty", "The Void", "Arby's Parking Lot", "Abandoned Blockbuster", "The DMV", "Mirror Maze", "Spirit Halloween", "Denny's Ball Pit", "Inside an Air Fryer", "A Haunted IKEA", "Backrooms Level 0", "Under an Overpass", "Chuck E. Cheese Kitchen", "A 1-Star Motel", "Fyre Festival Tent"],
            ["Tsunami", "Volcano Eruption", "Blizzard", "Tornado", "Earthquake", "Hurricane", "Flash Flood", "Solar Flare", "Wildfire", "Mudslide"],
            ["Used Pizza", "Pocket Lint Salad", "Liquid Hotdog", "Coughed-On Apple", "Floor Spice Ramen", "Gas Station Sushi", "Half-Eaten Shoe", "Drywall Burrito", "Deep-Fried AA Battery", "Mystery Puddle Soup", "Loose Tooth Tacos", "Sweaty Cheese Cubes", "Sock of Pudding", "Microwaved Ham Water", "Lawnmower Clippings", "Used Band-Aid Stew"],
            ["With a Single Chopstick", "Inside a Glitter Cannon", "By Hairdryer", "Using Engine Heat", "In a Dirty Shoe", "Over a Trashcan Fire", "Aggressive Shaking", "In a Dishwasher"],
            ["Dr. Irregular", "Lord Bigboobza", "Man Roe", "Suckerberg", "Hoebag", "Ms Lobster", "Papa John", "McDonald's", "Wendy's", "The Burger King", "Colonel Sanders", "Little Caesar"]
        ];

        const itemH = 85; 
        const outputIds = ['res-loc', 'res-dis', 'res-food', 'res-cook', 'res-buddy'];
        let reelOffsets = [0, 0, 0, 0, 0];
        let animationFrames = [];

        function initReel(index) {
            const container = document.getElementById(`reel-${index + 1}`);
            const items = data[index];
            const content = [...items, ...items, ...items].map(text => `<div class="reel-text">${text}</div>`).join('');
            container.innerHTML = content;
            reelOffsets[index] = itemH; 
            container.style.transform = `translateY(${itemH}px)`;
            container.children[0].classList.add('selected-item');
        }

        function startSpin() {
            const btn = document.getElementById('spin-button');
            const status = document.getElementById('status-light');
            btn.disabled = true;
            status.innerText = "Spinning...";
            status.style.color = "#ff5252";

            document.querySelectorAll('.action-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.reel-text').forEach(t => t.classList.remove('selected-item'));
            document.querySelectorAll('.column').forEach(c => c.classList.add('spinning'));

            for (let i = 0; i < 5; i++) {
                const container = document.getElementById(`reel-${i+1}`);
                const speed = 7 + (Math.random() * 3); 
                const itemsCount = data[i].length;
                
                function animate() {
                    reelOffsets[i] -= speed;
                    const loopPoint = -(itemsCount * itemH);
                    if (reelOffsets[i] <= loopPoint) {
                        reelOffsets[i] += (itemsCount * itemH);
                    }
                    container.style.transform = `translateY(${reelOffsets[i]}px)`;
                    animationFrames[i] = requestAnimationFrame(animate);
                }
                animate();
            }

            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    cancelAnimationFrame(animationFrames[i]);
                    const container = document.getElementById(`reel-${i+1}`);
                    const col = document.getElementById(`col-${i+1}`);
                    col.classList.remove('spinning');
                    
                    const items = data[i];
                    const finalIndex = Math.floor(Math.random() * items.length);
                    const snapPoint = -(finalIndex * itemH) + itemH;
                    
                    container.style.transition = "transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)";
                    reelOffsets[i] = snapPoint;
                    container.style.transform = `translateY(${snapPoint}px)`;
                    
                    setTimeout(() => {
                        const nodes = container.querySelectorAll('.reel-text');
                        nodes[finalIndex].classList.add('selected-item');
                        document.getElementById(outputIds[i]).innerText = items[finalIndex];
                        document.getElementById(`item-${i}`).classList.add('active');
                        container.style.transition = "";
                    }, 100);

                    if (i === 4) {
                        setTimeout(() => {
                            btn.disabled = false;
                            status.innerText = "Ready";
                            status.style.color = "#4caf50";
                        }, 600);
                    }
                }, 1500 + (i * 1200)); 
            }
        }

        for(let i=0; i<5; i++) initReel(i);
    </script>
</body>
</html>
