<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie's Wacky Multi-Slot</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --slot-bg: #2d2d2d;
            --border-color: #333;
            --text-color: #e0e0e0;
            
            /* Accent Colors */
            --color-1: #64b5f6; /* Blue */
            --color-2: #ff8a65; /* Orange */
            --color-3: #fff176; /* Yellow */
            --color-4: #ba68c8; /* Purple */
            --color-5: #ff5252; /* Red */
            
            --item-h: 85px; 
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #app-container {
            background-color: var(--container-bg);
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            max-width: 1100px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        /* Mode Switcher UI */
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        #title { font-size: 24px; font-weight: 800; transition: color 0.3s;}
        #status-light { font-weight: bold; font-size: 17px; color: #4caf50; }

        .mode-switcher {
            display: flex;
            background: #0a0a0a;
            border-radius: 30px;
            padding: 4px;
            border: 1px solid #333;
            flex-wrap: wrap;
        }

        .mode-btn {
            background: transparent;
            color: #888;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mode-btn.active {
            background: #515e9c;
            color: white;
            box-shadow: 0 2px 10px rgba(81, 94, 156, 0.4);
        }

        .mode-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Slot Machine Grid */
        #slot-machine {
            display: grid;
            gap: 12px;
            margin-bottom: 25px;
            position: relative;
            transition: grid-template-columns 0.4s ease;
        }

        #slot-machine::after {
            content: "";
            position: absolute;
            top: calc(var(--item-h) + 40px); 
            left: -5px;
            right: -5px;
            height: var(--item-h);
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
            pointer-events: none;
            border-radius: 6px;
            z-index: 10;
        }

        .column {
            background-color: var(--slot-bg);
            border-radius: 10px;
            height: calc(var(--item-h) * 3 + 40px); 
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid #444;
            position: relative;
        }

        .col-header {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 11px;
            letter-spacing: 1.2px;
            background: #252525;
            color: #aaa;
            z-index: 20;
            border-bottom: 1px solid #444;
            text-transform: uppercase;
        }

        .slot-display {
            height: calc(var(--item-h) * 3);
            position: relative;
            overflow: hidden;
        }

        .reel-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
        }

        .reel-text {
            font-size: 16px;
            font-weight: 800;
            text-align: center;
            height: var(--item-h);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            box-sizing: border-box;
            opacity: 0.15;
            transition: opacity 0.4s, transform 0.4s, color 0.4s;
        }

        .spinning .reel-text { filter: blur(1.5px); }
        
        .selected-item { 
            opacity: 1 !important;
            transform: scale(1.05);
            text-shadow: 0 0 12px currentColor;
        }

        /* Dynamic Actions Box */
        .action-list {
            display: grid;
            gap: 12px;
            grid-template-columns: 1fr 1fr;
        }

        /* If 3 or 5 items, make the last one span full width. If 4, it's a perfect 2x2 grid. */
        .action-list[data-cols="3"] .action-item:last-child,
        .action-list[data-cols="5"] .action-item:last-child {
            grid-column: span 2;
        }

        .action-item {
            font-size: 20px; 
            font-weight: 700;
            padding: 15px 20px;
            background: #222;
            border-radius: 8px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .action-item.active {
            background: #2a2a2a;
            border-left-width: 12px !important;
            transform: translateX(8px);
        }

        .label { font-weight: 800; color: #666; font-size: 12px; display: block; margin-bottom: 4px; text-transform: uppercase;}

        #spin-button {
            width: 100%;
            background-color: #515e9c;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 18px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 20px;
        }

        #spin-button:disabled { background-color: #333; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="app-container">
        
        <div id="top-bar">
            <div class="mode-switcher">
                <button class="mode-btn active" id="btn-story" onclick="switchMode('story')">📖 Story Roulette</button>
                <button class="mode-btn" id="btn-spell" onclick="switchMode('spell')">🪄 Spell Roulette</button>
                <button class="mode-btn" id="btn-tech" onclick="switchMode('tech')">💻 Tech Nightmare</button>
                <button class="mode-btn" id="btn-prize" onclick="switchMode('prize')">🎟️ Prize Nightmare</button>
            </div>
            <div id="status-light">Ready</div>
        </div>

        <header>
            <div id="title">📖 Story Roulette</div>
        </header>

        <div id="slot-machine"></div>
        
        <div id="action-box">
            <div class="action-list" id="action-list"></div>
        </div>

        <button id="spin-button" onclick="startSpin()">Randomize!</button>
    </div>

    <script>
        // --- DATA DICTIONARIES ---
        const modes = {
            story: {
                title: "📖 Story Roulette",
                headers: ["The Job", "The Habit", "The Complication", "The Consequence"],
                colors: ["var(--color-1)", "var(--color-3)", "var(--color-4)", "var(--color-2)"], // Blue, Yellow, Purple, Orange
                data: [
                    ["Shark Tongue Seller", "Professional Cloud Yeller", "Underground Cheese Smuggler", "Competitive Pigeon Racer", "Black Market Lego Dealer", "Vampire Dentist", "Part-Time Sasquatch Impersonator", "Amateur Tornado Wrestler", "Ghost Real Estate Agent", "Certified Time-Traveler Assistant", "Used Submarine Salesman", "Squirrel Interpreter"],
                    ["Eating Corn Longways", "Collecting Rubber Ducks", "Hoarding Ketchup Packets", "Sniffing New Books", "Watching QVC", "Biting String Cheese", "Aggressive Gardening", "Stepping Only On Cracks", "Organizing Paperclips", "Peeling Sunburns", "Drinking Hot Dog Water", "Sorting Skittles by Flavor", "Meowing at Stray Cats", "Microwaving Salad", "Chewing on Aluminum Foil", "Applauding when the plane lands", "Putting milk in before cereal", "Eating Kiwi with the skin on", "Biting ice cream with front teeth", "Licking 9-volt batteries", "Screaming at stop signs", "Giving fake names at Starbucks", "Walking backwards everywhere", "Carrying a raw egg in my pocket"],
                    ["but severely allergic to it", "while crying quietly", "but absolutely terrified of it", "and deeply ashamed", "while sleepwalking", "only in public spaces", "but fiercely protective of it", "and sweat profusely doing it", "while heavily disguised", "but I deny it completely", "while wearing a clown suit", "but my mom is watching", "and the FBI knows", "while holding my breath", "but it makes me sneeze violently", "while narrating my own life"],
                    ["in my nightly dreams", "every Tuesday at 3 AM", "to assert dominance", "when the moon is full", "during family dinners", "on national television", "to avoid paying taxes", "and my dog judges me", "while maintaining unbroken eye contact", "just to feel something", "and I blame it on ghosts", "in the middle of job interviews", "whenever the Wi-Fi goes down", "and my ancestors are weeping", "while singing the national anthem", "and it's ruining my credit score", "as a form of silent protest", "during important Zoom meetings", "and I'm banned from Walmart", "so the aliens won't abduct me", "and it costs me $400 a week"]
                ]
            },
            spell: {
                title: "🪄 Spell Roulette",
                headers: ["Location", "Disaster", "Food", "Cooking", "The Villain"],
                colors: ["var(--color-1)", "var(--color-2)", "var(--color-3)", "var(--color-4)", "var(--color-5)"],
                data: [
                    ["A Mattress Store", "A Portal Potty", "The Void", "Arby's Parking Lot", "Abandoned Blockbuster", "The DMV", "Mirror Maze", "Spirit Halloween", "Denny's Ball Pit", "Inside an Air Fryer", "A Haunted IKEA", "Backrooms Level 0", "Under an Overpass", "Chuck E. Cheese Kitchen", "A 1-Star Motel", "Fyre Festival Tent"],
                    ["Tsunami", "Volcano Eruption", "Blizzard", "Tornado", "Earthquake", "Hurricane", "Flash Flood", "Solar Flare", "Wildfire", "Mudslide"],
                    ["Used Pizza", "Pocket Lint Salad", "Liquid Hotdog", "Coughed-On Apple", "Floor Spice Ramen", "Gas Station Sushi", "Half-Eaten Shoe", "Drywall Burrito", "Deep-Fried AA Battery", "Mystery Puddle Soup", "Loose Tooth Tacos", "Sweaty Cheese Cubes", "Sock of Pudding", "Microwaved Ham Water", "Lawnmower Clippings", "Used Band-Aid Stew"],
                    ["With a Single Chopstick", "Inside a Glitter Cannon", "By Hairdryer", "Using Engine Heat", "In a Dirty Shoe", "Over a Trashcan Fire", "Aggressive Shaking", "In a Dishwasher"],
                    ["Dr. Irregular", "Lord Bigboobza", "Man Roe", "Suckerberg", "Hoebag", "Ms Lobster", "Papa John", "McDonald's", "Wendy's", "The Burger King", "Colonel Sanders", "Little Caesar"]
                ]
            },
            tech: {
                title: "💻 Tech Scammer Nightmare",
                headers: ["The Device", "The Problem", "The Payment", "The Distraction"],
                colors: ["var(--color-1)", "var(--color-5)", "var(--color-3)", "var(--color-2)"],
                data: [
                    ["Windows 95 on a CRT Monitor", "A Rotary Phone wired to a Fax", "Commodore 64", "My grandson's Gameboy Color", "A telegraph machine", "A microwave with a screen", "Palm Pilot from 1999", "An Overhead Projector", "A Nintendo Virtual Boy", "A Typewriter with Wi-Fi", "Etch A Sketch"],
                    ["The floppy disk is stuck in the CD drive", "I tried to fax the Bitcoin to you", "My dial-up tone sounds like it's crying", "The invoice printed in invisible ink", "The mouse ball rolled under the fridge", "AOL says I have zero hours remaining", "My anti-virus is just a picture of a dog", "The screen says 'Insert Coin to Continue'", "I poured water in the back to cool it off", "My carrier pigeon lost the reset code"],
                    ["Mailing pennies in a shoebox", "Sending payment via horseback mail", "Sending a fax of a physical check", "Paying in Blockbuster Late Fees", "Chuck E. Cheese Game Tokens", "Monopoly Money (the orange bills)", "Bartering my collection of rare Pogs", "A shiny Charizard card", "Writing an I.O.U. on a napkin", "Gold doubloons from a sunken ship"],
                    ["Hold on, I have to crank the generator", "Wait, I dropped my monocle", "My hearing trumpet is clogged", "I need to rewind the VHS tape first", "Let me ask my Ouija board", "The dial-up is disconnecting, don't breathe", "Hold on, my soup is burning", "I have to wind up my pocket watch", "My parrot is mimicking my password", "Let me grab my abacus to calculate the fee"]
                ]
            },
            prize: {
                title: "🎟️ Prize Scammer Nightmare",
                headers: ["Prize Demands", "Gift Card Fail", "Online Roadblock", "The Distraction"],
                colors: ["var(--color-3)", "var(--color-5)", "var(--color-1)", "var(--color-4)"],
                data: [
                    ["Plus a $50 Applebee's gift card", "And you must pay the taxes on it upfront", "Throw in a set of premium snow tires", "But I want the cash entirely in $2 bills", "Plus a signed apology letter to my cat", "And you need to deliver it in a white limo", "Throw in a year of free lawn maintenance", "Plus you have to pay off my mortgage", "But I want it delivered in bags of quarters", "Throw in a brand new riding lawnmower", "And a lifetime supply of canned baked beans", "Plus a VIP pass to the local petting zoo", "And you have to adopt my pet iguana", "Plus an extra $50 just for my time"],
                    ["The cashier locked the cards in a safe", "Target says I'm buying too many", "I melted the Apple cards in the microwave", "The barcode is smeared with jelly", "I bought Roblox instead of Google Play", "I traded the gift card for a magic bean", "I scratched too hard and made a hole", "I accidentally ate the scratch-off code", "The store clerk tackled me", "I washed my pants with the cards inside"],
                    ["My password has special characters I can't type, like an up arrow", "I have to wait 3-5 days for a verification postcard", "The website wants me to update Internet Explorer 8", "I keep failing the traffic light captcha", "My grandson put a parental lock on my bank app", "The verification code went to an AOL email from 2004", "My computer is forcing a 3-hour Windows update", "Zelle says I need to call the fraud department first", "The 2-factor authentication went to my landline", "I got locked out for typing the wrong password 14 times", "The online banking form requires a blood type"],
                    ["My dog is eating my router", "I have to take my pet rock for a walk", "Wait, my favorite soap opera is on", "I need to ask my crystal ball first", "Hold on, the cops are at my door... oh wait, it's the mailman", "I'm currently stuck in an elevator", "My kitchen is on fire, give me a sec", "The FBI is calling on my other line", "I need to go water my plastic plants"]
                ]
            }
        };

        // --- STATE ---
        let currentMode = 'story'; 
        let isSpinning = false; // Add state lock
        const itemH = 85; 
        let reelOffsets = [];
        let animationFrames = [];

        // --- CORE FUNCTIONS ---
        function switchMode(modeKey) {
            if (isSpinning) return; // Prevent switching while spinning

            currentMode = modeKey;
            const config = modes[modeKey];
            const colCount = config.data.length;

            // Update UI Buttons
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${modeKey}`).classList.add('active');

            // Update Title
            document.getElementById('title').innerText = config.title;

            // Clear and Rebuild Slot Grid
            const slotGrid = document.getElementById('slot-machine');
            slotGrid.style.gridTemplateColumns = `repeat(${colCount}, 1fr)`;
            slotGrid.innerHTML = '';
            
            // Clear and Rebuild Action List
            const actionList = document.getElementById('action-list');
            actionList.setAttribute('data-cols', colCount);
            actionList.innerHTML = '';

            // Reset Animation Arrays
            reelOffsets = new Array(colCount).fill(0);
            animationFrames.forEach(cancelAnimationFrame);
            animationFrames = new Array(colCount).fill(null);

            // Generate DOM Elements
            for (let i = 0; i < colCount; i++) {
                const color = config.colors[i];
                
                // 1. Build Slot Column
                slotGrid.innerHTML += `
                    <div class="column" id="col-${i}">
                        <div class="col-header">${config.headers[i]}</div>
                        <div class="slot-display">
                            <div class="reel-container" id="reel-${i}"></div>
                        </div>
                    </div>
                `;

                // 2. Build Action List Item
                actionList.innerHTML += `
                    <div class="action-item" id="item-${i}" style="border-left: 6px solid ${color}">
                        <span class="label">${config.headers[i]}</span> 
                        <span id="res-${i}" style="color: ${color}">-</span>
                    </div>
                `;
            }

            // Initialize Reels via timeout to allow DOM to render
            setTimeout(() => {
                for(let i=0; i<colCount; i++) {
                    initReel(i);
                    // Set color rule dynamically for the reel text
                    const reelContainer = document.getElementById(`reel-${i}`);
                    reelContainer.style.color = config.colors[i];
                }
            }, 50);
        }

        function initReel(index) {
            const container = document.getElementById(`reel-${index}`);
            const items = modes[currentMode].data[index];
            const content = [...items, ...items, ...items].map(text => `<div class="reel-text">${text}</div>`).join('');
            container.innerHTML = content;
            
            reelOffsets[index] = itemH; 
            container.style.transform = `translateY(${itemH}px)`;
            container.children[0].classList.add('selected-item');
        }

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;

            const btn = document.getElementById('spin-button');
            const status = document.getElementById('status-light');
            const config = modes[currentMode];
            const colCount = config.data.length;

            btn.disabled = true;
            status.innerText = "Spinning...";
            status.style.color = "#ff5252";

            // Disable mode buttons
            document.querySelectorAll('.mode-btn').forEach(mBtn => mBtn.disabled = true);

            document.querySelectorAll('.action-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.reel-text').forEach(t => t.classList.remove('selected-item'));
            document.querySelectorAll('.column').forEach(c => c.classList.add('spinning'));

            for (let i = 0; i < colCount; i++) {
                const container = document.getElementById(`reel-${i}`);
                const speed = 7 + (Math.random() * 3); 
                const itemsCount = config.data[i].length;
                
                function animate() {
                    reelOffsets[i] -= speed;
                    const loopPoint = -(itemsCount * itemH);
                    if (reelOffsets[i] <= loopPoint) {
                        reelOffsets[i] += (itemsCount * itemH);
                    }
                    container.style.transform = `translateY(${reelOffsets[i]}px)`;
                    animationFrames[i] = requestAnimationFrame(animate);
                }
                animate();
            }

            for (let i = 0; i < colCount; i++) {
                setTimeout(() => {
                    cancelAnimationFrame(animationFrames[i]);
                    const container = document.getElementById(`reel-${i}`);
                    const col = document.getElementById(`col-${i}`);
                    col.classList.remove('spinning');
                    
                    const items = config.data[i];
                    const finalIndex = Math.floor(Math.random() * items.length);
                    const snapPoint = -(finalIndex * itemH) + itemH;
                    
                    container.style.transition = "transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)";
                    reelOffsets[i] = snapPoint;
                    container.style.transform = `translateY(${snapPoint}px)`;
                    
                    setTimeout(() => {
                        const nodes = container.querySelectorAll('.reel-text');
                        nodes[finalIndex].classList.add('selected-item');
                        document.getElementById(`res-${i}`).innerText = items[finalIndex];
                        document.getElementById(`item-${i}`).classList.add('active');
                        container.style.transition = "";
                    }, 100);

                    // Final unlock on the last column
                    if (i === colCount - 1) {
                        setTimeout(() => {
                            btn.disabled = false;
                            status.innerText = "Ready";
                            status.style.color = "#4caf50";
                            // Re-enable mode buttons
                            document.querySelectorAll('.mode-btn').forEach(mBtn => mBtn.disabled = false);
                            isSpinning = false; // Release the lock
                        }, 600);
                    }
                }, 1500 + (i * 1200)); 
            }
        }

        // --- INIT ---
        switchMode('story'); 
    </script>
</body>
</html>
